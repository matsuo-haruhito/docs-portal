# Solid Queue recurring tasks.
# Business recurring jobs are managed in recurring_job_schedules.
# This recurring task only wakes the dispatcher once per minute.

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  recurring_job_dispatcher:
    class: RecurringJobDispatcherJob
    schedule: every 1 minute

development:
  recurring_job_dispatcher:
    class: RecurringJobDispatcherJob
    schedule: every 1 minute

test: {}
