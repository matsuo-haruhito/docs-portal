name: ci

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:18.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: docs_portal
          POSTGRES_DB: docs_portal_test
          POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=C
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect root JavaScript dependency changes
        id: root-js-changes
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            if git merge-base "origin/${{ github.base_ref }}" HEAD >/dev/null 2>&1; then
              changed_files=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
            else
              echo "merge base unavailable for origin/${{ github.base_ref }}...HEAD; falling back to tree diff against the pull request merge commit" >&2
              changed_files=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)
            fi
          else
            changed_files=$(git diff --name-only HEAD^ HEAD)
          fi

          if echo "$changed_files" | grep -Eq '^(package.json|package-lock.json|app/javascript/|config/vite|vite.config\.|postcss.config\.|tailwind.config\.)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create .env from .env.example
        run: |
          cp .env.example .env
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.example >> "$GITHUB_ENV"
          echo "RAILS_ENV=test" >> "$GITHUB_ENV"

      - name: Resolve .env.example database host on runner
        run: |
          sudo sh -c 'echo "127.0.0.1 db" >> /etc/hosts'

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false

      - name: Cache Ruby dependencies
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-ruby-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-

      - name: Install Ruby dependencies
        run: |
          bundle config set path vendor/bundle
          bundle lock --add-platform x86_64-linux
          bundle install --jobs 4 --retry 3

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org/

      - name: Install JavaScript dependencies
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci

      - name: Prepare test database without seeds
        run: bundle exec rails db:migrate

      - name: Run specs
        id: rspec
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p tmp
          bundle exec rspec 2>&1 | tee tmp/rspec.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: RSpec failure summary
        if: ${{ steps.rspec.outcome == 'failure' }}
        shell: bash
        run: |
          ruby <<'RUBY' | tee -a "$GITHUB_STEP_SUMMARY"
          log = File.read("tmp/rspec.log")
          failure_index = log.index(/^Failures:\n/)
          failed_examples_index = log.index(/^Failed examples:\n/)

          summary = if failure_index
            finish_index = log.index(/^Finished in /, failure_index) || log.length
            log[failure_index...finish_index]
          elsif failed_examples_index
            log[failed_examples_index..]
          else
            log.lines.last(160).join
          end

          puts "RSpec failure summary"
          puts
          puts summary.lines.first(240).join
          RUBY

      - uses: actions/upload-artifact@v7
        if: ${{ steps.rspec.outcome == 'failure' }}
        with:
          name: rspec-log
          path: tmp/rspec.log

      - name: Fail when specs fail
        if: ${{ steps.rspec.outcome == 'failure' }}
        run: exit 1

  seed-smoke:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:18.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: docs_portal
          POSTGRES_DB: docs_portal_test
          POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=C
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Create .env from .env.example
        run: |
          cp .env.example .env
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.example >> "$GITHUB_ENV"
          echo "RAILS_ENV=test" >> "$GITHUB_ENV"

      - name: Resolve .env.example database host on runner
        run: |
          sudo sh -c 'echo "127.0.0.1 db" >> /etc/hosts'

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false

      - name: Cache Ruby dependencies
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-ruby-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-

      - name: Install Ruby dependencies
        run: |
          bundle config set path vendor/bundle
          bundle lock --add-platform x86_64-linux
          bundle install --jobs 4 --retry 3

      - name: Prepare database with seeds
        run: bundle exec rails db:prepare

  security-audit:
    runs-on: ubuntu-latest
    needs: test
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]')
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false

      - name: Install Ruby dependencies
        run: |
          bundle lock --add-platform x86_64-linux
          bundle install --jobs 4 --retry 3

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docusaurus/package-lock.json
          registry-url: https://registry.npmjs.org/

      - name: Audit Ruby dependencies
        run: bundle exec bundler-audit check --update

      - name: Audit JavaScript dependencies
        run: npm audit --audit-level=high

      - name: Install Docusaurus dependencies
        working-directory: ./docusaurus
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci

      - name: Audit Docusaurus dependencies
        working-directory: ./docusaurus
        run: npm audit --audit-level=high

  build-docs:
    runs-on: ubuntu-latest
    needs: test
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]')
      }}

    env:
      RAILS_PORTAL_IMPORT_URL: ${{ secrets.RAILS_PORTAL_IMPORT_URL }}
      RAILS_PORTAL_IMPORT_TOKEN: ${{ secrets.RAILS_PORTAL_IMPORT_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docusaurus/package-lock.json
          registry-url: https://registry.npmjs.org/

      - name: Install Docusaurus dependencies
        working-directory: ./docusaurus
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci

      - name: Build Docusaurus site
        working-directory: ./docusaurus
        run: npm run build

      - name: Create manifest
        run: |
          node ./scripts/generate_publish_manifest.mjs \
            --config ./publish/documents.json \
            --output ./publish/manifest/publish.json \
            --repository "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --sha "${{ github.sha }}" \
            --artifact-name "docs-site" \
            --workflow-run-id "${{ github.run_id }}" \
            --workflow-run-attempt "${{ github.run_attempt }}" \
            --manifest-path "publish/manifest/publish.json"

      - name: Archive build output
        run: |
          tar -czf docs-site.tar.gz docusaurus/build attachments publish/manifest

      - uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: docs-site.tar.gz

      - name: Call Rails import API
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.RAILS_PORTAL_IMPORT_URL != '' && env.RAILS_PORTAL_IMPORT_TOKEN != '' }}
        run: |
          curl -X POST "$RAILS_PORTAL_IMPORT_URL" \
            -H "Authorization: Bearer $RAILS_PORTAL_IMPORT_TOKEN" \
            -F "artifact_root=$(pwd)" \
            -F "manifest_path=$(pwd)/publish/manifest/publish.json"
