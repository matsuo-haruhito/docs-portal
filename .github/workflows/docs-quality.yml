name: docs-quality

on:
  push:
    branches: [dev, main]
    paths:
      - README.md
      - ROADMAP.md
      - Product Profile.md
      - doc/**/*.md
      - docs/**/*.md
      - app/frontend/entrypoints/application.js
      - app/renderers/docusaurus_site_renderer.rb
      - spec/renderers/docusaurus_site_renderer_spec.rb
      - docusaurus/docusaurus.config.ts
      - docusaurus/package.json
      - docusaurus/package-lock.json
      - docusaurus/plugins/remark-kroki-diagrams.mjs
      - docusaurus/plugins/remark-kroki-diagrams.smoke.test.mjs
      - .env.example
      - docker-compose.kroki.yml
      - .github/workflows/docs-quality.yml
      - .github/scripts/check_markdown_links.rb
      - .github/scripts/check_docs_quality_permissions.rb
      - .github/scripts/check_kroki_runtime_docs.rb
      - .github/scripts/check_formal_review_workflow_boundary.rb
      - .github/scripts/check_todo_queue_boundary.rb
      - .github/scripts/check_docusaurus_table_metadata_boundary.rb
      - .github/scripts/check_search_index_rebuild_history_boundary.rb
      - .github/scripts/check_csv_metadata_json_boundary.rb
      - .github/scripts/check_document_file_csv_tsv_viewer_boundary.rb
      - .github/scripts/check_access_log_boundary.rb
      - .github/scripts/check_api_specification_dry_run_boundary.rb
      - .github/scripts/check_storage_usage_csv_boundary.rb
      - .github/scripts/check_maintenance_route_inventory_boundary.rb
      - .github/scripts/check_git_import_run_project_filter_boundary.rb
      - .github/scripts/check_import_dry_run_history_boundary.rb
      - .github/scripts/check_issue_pr_number_boundary.rb
      - .github/scripts/check_readme_docs_entrance_boundary.rb
      - .github/scripts/check_microsoft_graph_preview_boundary.rb
      - .github/scripts/check_closed_active_queue_labels.rb
      - .github/scripts/check_frontend_entrypoint_policy.rb
      - .markdownlint-cli2.yaml
  pull_request:
    paths:
      - README.md
      - ROADMAP.md
      - Product Profile.md
      - doc/**/*.md
      - docs/**/*.md
      - app/frontend/entrypoints/application.js
      - app/renderers/docusaurus_site_renderer.rb
      - spec/renderers/docusaurus_site_renderer_spec.rb
      - docusaurus/docusaurus.config.ts
      - docusaurus/package.json
      - docusaurus/package-lock.json
      - docusaurus/plugins/remark-kroki-diagrams.mjs
      - docusaurus/plugins/remark-kroki-diagrams.smoke.test.mjs
      - .env.example
      - docker-compose.kroki.yml
      - .github/workflows/docs-quality.yml
      - .github/scripts/check_markdown_links.rb
      - .github/scripts/check_docs_quality_permissions.rb
      - .github/scripts/check_kroki_runtime_docs.rb
      - .github/scripts/check_formal_review_workflow_boundary.rb
      - .github/scripts/check_todo_queue_boundary.rb
      - .github/scripts/check_docusaurus_table_metadata_boundary.rb
      - .github/scripts/check_search_index_rebuild_history_boundary.rb
      - .github/scripts/check_csv_metadata_json_boundary.rb
      - .github/scripts/check_document_file_csv_tsv_viewer_boundary.rb
      - .github/scripts/check_access_log_boundary.rb
      - .github/scripts/check_api_specification_dry_run_boundary.rb
      - .github/scripts/check_storage_usage_csv_boundary.rb
      - .github/scripts/check_maintenance_route_inventory_boundary.rb
      - .github/scripts/check_git_import_run_project_filter_boundary.rb
      - .github/scripts/check_import_dry_run_history_boundary.rb
      - .github/scripts/check_issue_pr_number_boundary.rb
      - .github/scripts/check_readme_docs_entrance_boundary.rb
      - .github/scripts/check_microsoft_graph_preview_boundary.rb
      - .github/scripts/check_closed_active_queue_labels.rb
      - .github/scripts/check_frontend_entrypoint_policy.rb
      - .markdownlint-cli2.yaml

permissions:
  contents: read

jobs:
  docs-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version

      - name: Check docs-quality workflow permissions
        run: ruby .github/scripts/check_docs_quality_permissions.rb

      - name: Check Kroki optional runtime docs
        run: ruby .github/scripts/check_kroki_runtime_docs.rb

      - name: Check formal review workflow boundary docs
        run: ruby .github/scripts/check_formal_review_workflow_boundary.rb

      - name: Check ToDo queue boundary docs
        run: ruby .github/scripts/check_todo_queue_boundary.rb

      - name: Check Docusaurus table metadata boundary docs
        run: ruby .github/scripts/check_docusaurus_table_metadata_boundary.rb

      - name: Check search index rebuild history boundary docs
        run: ruby .github/scripts/check_search_index_rebuild_history_boundary.rb

      - name: Check CSV metadata JSON boundary docs
        run: ruby .github/scripts/check_csv_metadata_json_boundary.rb

      - name: Check CSV / TSV DocumentFile viewer boundary docs
        run: ruby .github/scripts/check_document_file_csv_tsv_viewer_boundary.rb

      - name: Check AccessLog boundary docs
        run: ruby .github/scripts/check_access_log_boundary.rb

      - name: Check API specification dry-run boundary docs
        run: ruby .github/scripts/check_api_specification_dry_run_boundary.rb

      - name: Check storage usage CSV boundary docs
        run: ruby .github/scripts/check_storage_usage_csv_boundary.rb

      - name: Check maintenance route inventory boundary docs
        run: ruby .github/scripts/check_maintenance_route_inventory_boundary.rb

      - name: Check Git import run project filter boundary docs
        run: ruby .github/scripts/check_git_import_run_project_filter_boundary.rb

      - name: Check import dry-run history boundary docs
        run: ruby .github/scripts/check_import_dry_run_history_boundary.rb

      - name: Check Issue / PR number boundary docs
        run: ruby .github/scripts/check_issue_pr_number_boundary.rb

      - name: Check README/docs entrance boundary docs
        run: ruby .github/scripts/check_readme_docs_entrance_boundary.rb

      - name: Check Microsoft Graph preview boundary docs
        run: ruby .github/scripts/check_microsoft_graph_preview_boundary.rb

      - name: Check closed active queue label digest
        run: ruby .github/scripts/check_closed_active_queue_labels.rb --self-test

      - name: Check frontend entrypoint policy
        run: ruby .github/scripts/check_frontend_entrypoint_policy.rb

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            README.md
            ROADMAP.md
            Product Profile.md
            doc/**/*.md
            docs/**/*.md

      - name: Check relative markdown links
        run: ruby .github/scripts/check_markdown_links.rb

      - name: Run Kroki diagram mock smoke
        working-directory: ./docusaurus
        run: npm run smoke:kroki
