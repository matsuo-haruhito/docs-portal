name: test

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:18.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: docs_portal
          POSTGRES_DB: docs_portal_test
          POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=C
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from .env.example
        run: |
          cp .env.example .env
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.example >> "$GITHUB_ENV"
          echo "RAILS_ENV=test" >> "$GITHUB_ENV"

      - name: Resolve .env.example database host on runner
        run: |
          sudo sh -c 'echo "127.0.0.1 db" >> /etc/hosts'

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false

      - name: Install Ruby dependencies
        run: |
          bundle lock --add-platform x86_64-linux
          bundle install --jobs 4 --retry 3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JavaScript dependencies
        run: npm install

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Run specs
        run: bundle exec rspec
