name: Generated file jobs

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      changed_files:
        description: Optional comma or newline separated paths to force matching jobs
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: generated-file-jobs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    # Avoid a commit produced by this workflow recursively triggering itself.
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'chore: update generated files')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Detect changed files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.changed_files }}" ]; then
            printf '%s\n' "${{ inputs.changed_files }}" | tr ',' '\n' | sed '/^$/d' > /tmp/generated-file-changed-files.txt
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > /tmp/generated-file-changed-files.txt
          else
            git diff --name-only HEAD~1 HEAD > /tmp/generated-file-changed-files.txt
          fi

          echo 'Changed files:'
          cat /tmp/generated-file-changed-files.txt
          {
            echo 'files<<EOF'
            cat /tmp/generated-file-changed-files.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run matched generated-file jobs
        env:
          GENERATED_FILE_JOB_CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: ruby bin/run_generated_file_jobs

      - name: Commit generated files
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No generated file changes.'
            exit 0
          fi

          git status --short
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: update generated files'
          git push
