services:
  app:
    environment:
      DOCUSAURUS_RENDERER_ENDPOINT: ${DOCUSAURUS_RENDERER_ENDPOINT:-http://docusaurus:3000}
    depends_on:
      db:
        condition: service_started
      docusaurus:
        condition: service_healthy

  docusaurus:
    build:
      context: .
      dockerfile: docusaurus-renderer/Dockerfile
    environment:
      KROKI_ENDPOINT: ${KROKI_ENDPOINT:-http://kroki:8000}
      MAX_UPLOAD_BYTES: ${DOCUSAURUS_RENDERER_MAX_UPLOAD_BYTES:-20971520}
      MAX_OUTPUT_BYTES: ${DOCUSAURUS_RENDERER_MAX_OUTPUT_BYTES:-52428800}
      BUILD_TIMEOUT_MS: ${DOCUSAURUS_RENDERER_BUILD_TIMEOUT_MS:-60000}
    ports:
      - '${PUBLISH_DOCUSAURUS_RENDERER_PORT:-3001}:3000'
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
